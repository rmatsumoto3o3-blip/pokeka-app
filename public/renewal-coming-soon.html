  * { box-sizing: border-box; margin: 0; padding: 0; }

  .cardback {

    border: 3px solid #ffffff; box-shadow: 0 2px 6px rgba(15,23,42,.18);
    position: relative; overflow: hidden;

  .cardback::before { content:''; position:absolute; inset:16%; border-radius:50%; border:2.5px solid rgba(255,255,255,.45); }
  .cardback::after { content:'\e2b3'; font-family:'tabler-icons'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.7); font-size:26px; }
  .cbgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:12px; opacity:.5; filter:saturate(.85); }
  @media (max-width:860px){ .cbgrid{ grid-template-columns:repeat(auto-fill,minmax(78px,1fr)); } }
  @media (max-width: 640px){

    .gametabs > *{ flex:0 0 auto; white-space:nowrap; }
    .gametabs > * span{ white-space:nowrap; }
    h1{ font-size:20px !important; line-height:1.45 !important; }
    section .wrap{ padding-left:14px !important; padding-right:14px !important; }
  }
</style>
</head>
